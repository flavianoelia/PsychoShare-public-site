<!DOCTYPE html>
<html lang="es">
    <head>

        <title>Mis contactos</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Sora:wght@100..800&display=saplay" rel="stylesheet">

    </head>

    <body>
        <header aria-label="Encabezado">
            <img src="" alt="Logo de PsychoShare" class="logo" />
            <h1>PsychoShare</h1>

        <nav aria-label="Menú de navegación">

        <main>
            <section aria-label="Buscador de contactos" class="contact-search">
                <form>
                    <input type="text" placeholder="Buscar contactos" class="search-input" />
                    <button type="submit" class="search-button">
                        <img src="" alt="len" />
                    </button>
                </form>
            </section>

            <section aria-label="Conteo de contactos" class="contact-count">
                <p class="count-text">123 contactos</p>
            </section>

            <section aria-label="Listado de contactos" class="contact-list">

                    <li>
                        <article class="contact-item">
                            <img src="#" alt="Foto de perfil" class="profile-photo" />

            <p>2025 PsychoShare - Hecho por PsyNet - Licencia MIT</p>
